{{ define "main" }}
<article>
  <h2 class="post-title">{{ .Title }}</h2>
  <p class="post-date"><em>posted on {{ .Date.Format "2006 Jan 02" }}</em></p>
  {{ if .Params.toc }}
  <nav class="toc">
    <strong>Contents</strong>
    {{ .TableOfContents }}
  </nav>
  <hr />
  {{ end }} {{ .Content }}
  <nav class="post-nav">
    <div class="post-nav-arrows">
      {{ with .NextInSection }}
      <a href="{{ .Permalink }}" id="nav-prev"><em>{{ .Title }}</em></a>
      {{ end }} {{ with .PrevInSection }}
      <a href="{{ .Permalink }}" id="nav-next"><em>{{ .Title }}</em></a>
      {{ end }}
    </div>
  </nav>
</article>
<script>
  document.addEventListener("keydown", function (e) {
    if (e.key === "ArrowLeft") {
      const prev = document.getElementById("nav-prev");
      if (prev) window.location.href = prev.href;
    }
    if (e.key === "ArrowRight") {
      const next = document.getElementById("nav-next");
      if (next) window.location.href = next.href;
    }
  });
</script>
{{ end }}
